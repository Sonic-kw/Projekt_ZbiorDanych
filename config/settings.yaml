debug: false
pipeline:
  # Options: scrape, raw, processed
  # scrape: fetch fresh listings, clean them, and recreate analysis
  # raw: use paths.raw_data, clean it, and recreate analysis
  # processed: use paths.processed_data and recreate analysis only
  data_source: "scrape"

scraper:
  start_url: "https://www.otomoto.pl/motocykle-i-quady"
  max_pages: 25
  timeout: 30000

cleaning:
  outlier_threshold: 1.5

analysis:
  bargain_threshold: 0.15
  clustering_clusters: 3

paths:
  raw_data: "data/raw/raw_listings.csv"
  processed_data: "data/processed/cleaned_listings.csv"
